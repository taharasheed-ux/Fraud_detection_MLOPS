global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "webhook-retrain"

  routes:
    - match:
        severity: critical
      receiver: "webhook-retrain"
    - match:
        severity: warning
      receiver: "webhook-retrain"

receivers:
  - name: "webhook-retrain"
    webhook_configs:
      - url: "http://fraud-api:8000/webhook/retrain"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
